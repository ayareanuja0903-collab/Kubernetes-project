apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-test
  labels:
    app: apache
    env: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: apache
      env: dev
  template:
    metadata:
      labels:
        app: apache
        env: dev
    spec:
      containers:
        - name: myapp-test
          image: anujaayare/myapp-test:latest
          ports:
            - containerPort: 80
      resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
      imagePullSecrets:
        - name: accesskey-nov-2025
      volumes:
        - name: apache-logs
          persistentVolumeClaim:
            claimName: pvc0001
        - name: apache-config
          configMap:
            name: apache-config